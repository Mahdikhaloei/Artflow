version: "3.9"

services:
  postgres:
    image: postgres:14
    container_name: flask_postgres
    volumes:
      - flask_pgdata:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    env_file:
      - ./.envs/.local/.postgres

  artflow: &artflow
    build:
      context: .
      dockerfile: ./compose/local/artflow/Dockerfile
    entrypoint: /boot.sh
    command: /start
    container_name: artflow_server
    volumes:
      - .:/app:z
    ports:
      - "8007:8000"
    env_file:
      - ./.envs/.local/.artflow
    depends_on:
      - postgres

  blender:
    image: linuxserver/blender
    container_name: blender_runner
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - .:/app:z

  rabbitmq:
    image: rabbitmq

  redis:
    image: redis

  worker:
    <<: *artflow
    build:
      context: .
      dockerfile: ./compose/local/artflow/Dockerfile
    container_name: artflow_worker
    depends_on:
      - redis
      - postgres
      - artflow
    ports: []
    command: /start-celery-worker
    volumes:
      - .:/app:z
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  flask_pgdata:
