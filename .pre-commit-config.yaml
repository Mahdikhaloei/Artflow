exclude: "^docs/|/migrations/|/versions/"
default_stages: [commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-merge-conflict
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.4.0
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        stages: [push]
        language: python
        additional_dependencies:
          - types-requests
        entry: sh -c "docker-compose -f local.yml -p artflow exec -w /app/core -T artflow mypy --explicit-package-bases . --config-file=mypy.ini"

  - repo: local
    hooks:
      - id: run-tests
        name: tests
        description: Run Flask unit tests with docker
        stages: [push]
        entry: sh -c "docker-compose -f local.yml -p artflow exec -w /app/core -T artflow pytest"
        language: system
        require_serial: true

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
